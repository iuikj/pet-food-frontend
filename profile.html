<!-- Pet Diet Plan Home Page -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>个人信息与宠物档案</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A3D9A5", // Soft sage green
                        secondary: "#FFE898", // Warm yellow
                        "accent-blue": "#B2EBF2", // Soft blue
                        "background-light": "#FAFAF9", // Warm off-white
                        "background-dark": "#1C1C1E", // Soft dark gray
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2C2C2E",
                        "text-main-light": "#2D3748",
                        "text-main-dark": "#F7FAFC",
                        "text-muted-light": "#718096",
                        "text-muted-dark": "#A0AEC0",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(163, 217, 165, 0.3)',
                    },
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased pb-28">
    <header
        class="px-6 pt-12 pb-2 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md sticky top-0 z-50">
        <div class="flex justify-end gap-3">
            <button
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">settings</span>
            </button>
            <button
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors"
                title="Toggle Theme">
                <span class="material-icons-round">dark_mode</span>
            </button>
        </div>
    </header>
    <main class="px-6 space-y-8">
        <section class="flex items-center gap-4">
            <div class="relative">
                <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-accent-blue p-1">
                    <img alt="User Avatar"
                        class="w-full h-full rounded-full object-cover border-2 border-white dark:border-background-dark"
                        src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-1.2.1&amp;auto=format&amp;fit=crop&amp;w=200&amp;q=80" />
                </div>
                <div
                    class="absolute bottom-0 right-0 w-6 h-6 bg-primary rounded-full border-2 border-white dark:border-background-dark flex items-center justify-center text-white">
                    <span class="material-icons-round text-[14px]">edit</span>
                </div>
            </div>
            <div>
                <h2 class="text-lg font-bold">Alex Chen</h2>
                <p class="text-sm text-text-muted-light dark:text-text-muted-dark">alex.chen@example.com</p>
                <div class="flex items-center gap-2 mt-2">
                    <span
                        class="px-2 py-0.5 bg-yellow-100 dark:bg-yellow-900/30 text-yellow-700 dark:text-yellow-300 rounded text-xs font-bold flex items-center gap-1">
                        <span class="material-icons-round text-[14px]">star</span> PRO 会员
                    </span>
                </div>
            </div>
        </section>
        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-xl font-bold">我的宠物</h2>
            </div>
            <div class="space-y-4">
                <div
                    class="bg-white dark:bg-surface-dark p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 relative overflow-hidden group">
                    <div
                        class="absolute top-0 right-0 w-24 h-24 bg-primary/5 rounded-full -mr-8 -mt-8 transition-transform group-hover:scale-110">
                    </div>
                    <div class="flex gap-4 relative z-10">
                        <div class="relative w-24 h-24 flex-shrink-0">
                            <img alt="Cooper" class="w-full h-full object-cover rounded-2xl shadow-sm"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBn9rRCCpDfMxR_3IoYBOVyNDNZADIHVHTErFZ1ecKqEnKJ0vl_NEf61nPEpN-muNBhi2X3_9QzQm9O2BOI0Y1XcNXFmw72fBSTG5SIfIRxxxsBrWfLqP0YcYbeXzX9-qStq9BpTXHo0YiOnjUMUtKIpl9qUKV7iaxqxdvMpKRAPntZHVH9ENBDRsvfy-7C6jtmoW-Bz_KrmfVcUz-PXlzyevQ_NUwkL4V6-3bbHLr_u_PgwcMgcMVavQRtmvGPSH9JDvWb6IV8viw" />
                        </div>
                        <div class="flex-1 min-w-0 py-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-xl truncate">Cooper</h3>
                                    <p class="text-sm text-text-muted-light dark:text-text-muted-dark">金毛寻回犬</p>
                                </div>
                                <button
                                    class="w-8 h-8 -mr-2 -mt-2 flex items-center justify-center rounded-full text-text-muted-light hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                                    <span class="material-icons-round text-lg">more_vert</span>
                                </button>
                            </div>
                            <div class="flex flex-wrap gap-2 mt-3">
                                <span
                                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-text-muted-light dark:text-text-muted-dark text-xs font-semibold">
                                    <span class="material-icons-round text-xs">cake</span> 3 岁
                                </span>
                                <span
                                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-text-muted-light dark:text-text-muted-dark text-xs font-semibold">
                                    <span class="material-icons-round text-xs">monitor_weight</span> 32 kg
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 pt-4 border-t border-gray-100 dark:border-gray-800 flex gap-3">
                        <button
                            class="flex-1 py-2.5 rounded-xl bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark text-sm font-semibold hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center justify-center gap-2">
                            <span class="material-icons-round text-base">edit</span>
                            编辑
                        </button>
                        <button
                            class="flex-1 py-2.5 rounded-xl border border-primary text-primary text-sm font-bold hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
                            <span class="material-icons-round text-base">assignment</span>
                            AI 档案
                        </button>
                    </div>
                </div>
                <div
                    class="bg-white dark:bg-surface-dark p-5 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 relative overflow-hidden">
                    <div class="flex gap-4">
                        <div
                            class="relative w-24 h-24 flex-shrink-0 bg-accent-blue/10 dark:bg-accent-blue/5 rounded-2xl flex items-center justify-center text-accent-blue border border-accent-blue/20">
                            <span class="material-icons-round text-4xl opacity-80">pets</span>
                        </div>
                        <div class="flex-1 min-w-0 py-1">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-xl truncate">Luna</h3>
                                    <p class="text-sm text-text-muted-light dark:text-text-muted-dark">英国短毛猫</p>
                                </div>
                                <button
                                    class="w-8 h-8 -mr-2 -mt-2 flex items-center justify-center rounded-full text-text-muted-light hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                                    <span class="material-icons-round text-lg">delete_outline</span>
                                </button>
                            </div>
                            <div class="flex flex-wrap gap-2 mt-3">
                                <span
                                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-text-muted-light dark:text-text-muted-dark text-xs font-semibold">
                                    <span class="material-icons-round text-xs">cake</span> 2 岁
                                </span>
                                <span
                                    class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg bg-gray-100 dark:bg-gray-800 text-text-muted-light dark:text-text-muted-dark text-xs font-semibold">
                                    <span class="material-icons-round text-xs">monitor_weight</span> 4.2 kg
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="mt-5 pt-4 border-t border-gray-100 dark:border-gray-800 flex gap-3">
                        <button
                            class="flex-1 py-2.5 rounded-xl bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark text-sm font-semibold hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors flex items-center justify-center gap-2">
                            <span class="material-icons-round text-base">edit</span>
                            编辑
                        </button>
                        <button
                            class="flex-1 py-2.5 rounded-xl border border-primary text-primary text-sm font-bold hover:bg-primary/5 transition-colors flex items-center justify-center gap-2">
                            <span class="material-icons-round text-base">assignment</span>
                            AI 档案
                        </button>
                    </div>
                </div>
                <button
                    class="w-full p-6 rounded-2xl border-2 border-dashed border-gray-200 dark:border-gray-700 hover:border-primary/50 dark:hover:border-primary/50 bg-gray-50/50 dark:bg-surface-dark/30 hover:bg-primary/5 transition-all group flex flex-col items-center justify-center gap-2">
                    <div
                        class="w-12 h-12 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light group-hover:text-white group-hover:bg-primary transition-all duration-300">
                        <span class="material-icons-round text-2xl">add</span>
                    </div>
                    <span
                        class="font-bold text-text-muted-light dark:text-text-muted-dark group-hover:text-primary transition-colors">新增宠物</span>
                </button>
            </div>
        </section>
    </main>
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 pb-safe pt-2 px-6 pb-6 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.03)] z-50">
        <div class="flex justify-between items-center">
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">home</span>
            </button>
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">calendar_today</span>
            </button>
            <button
                class="relative -top-6 bg-primary text-white dark:text-gray-900 w-14 h-14 rounded-full shadow-glow flex items-center justify-center transform transition-transform hover:scale-105 active:scale-95">
                <span class="material-icons-round text-2xl">menu_book</span>
            </button>
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">pie_chart</span>
            </button>
            <button class="flex flex-col items-center gap-1 w-12 text-primary">
                <span class="material-icons-round">person</span>
            </button>
        </div>
    </nav>
    <script>
        // Simple logic to toggle a class for demo purposes if needed
        const toggleBtn = document.querySelector('button[title="Toggle Theme"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
    </script>
</body>

</html>
