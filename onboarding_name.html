<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased selection:bg-primary selection:text-white pb-safe">
    <header
        class="px-6 pt-12 pb-4 flex items-center justify-between bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md sticky top-0 z-50">
        <button
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
            <span class="material-icons-round">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold text-center flex-1">添加宠物</h1>
        <div class="w-10 h-10 flex items-center justify-center">
            <span class="text-xs font-bold text-text-muted-light dark:text-text-muted-dark">1/3</span>
        </div>
    </header>
    <main class="px-6 pb-32 flex flex-col h-full">
        <div class="flex gap-2 mb-8 mt-2 px-2">
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
            <div class="h-1.5 flex-1 bg-gray-200 dark:bg-surface-dark rounded-full"></div>
            <div class="h-1.5 flex-1 bg-gray-200 dark:bg-surface-dark rounded-full"></div>
        </div>
        <div class="flex-1 flex flex-col items-center pt-8">
            <div class="w-full max-w-sm space-y-8">
                <div class="space-y-2 text-center">
                    <h2 class="text-2xl font-bold text-text-main-light dark:text-text-main-dark">它的名字是？</h2>
                </div>
                <div class="relative group">
                    <div
                        class="absolute inset-0 bg-primary/20 blur-xl rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <div
                        class="relative w-32 h-32 mx-auto bg-gray-100 dark:bg-surface-dark rounded-full flex items-center justify-center border-4 border-white dark:border-surface-light/5 shadow-soft cursor-pointer overflow-hidden hover:scale-105 transition-transform">
                        <span class="material-icons-round text-4xl text-text-muted-light">add_a_photo</span>
                        <img alt="Pet Preview"
                            class="absolute inset-0 w-full h-full object-cover opacity-0 hover:opacity-100 transition-opacity"
                            src="https://images.unsplash.com/photo-1552053831-71594a27632d?ixlib=rb-1.2.1&amp;auto=format&amp;fit=crop&amp;w=300&amp;q=80" />
                    </div>
                    <p class="text-xs text-center mt-3 text-text-muted-light">点击上传照片</p>
                </div>
                <div class="space-y-4">
                    <div
                        class="relative bg-surface-light dark:bg-surface-dark rounded-2xl shadow-soft transition-all focus-within:ring-2 focus-within:ring-primary/50 focus-within:shadow-glow">
                        <input
                            class="w-full bg-transparent border-none py-4 px-5 text-xl font-bold text-center text-text-main-light dark:text-text-main-dark focus:ring-0 placeholder-gray-300 dark:placeholder-gray-600 rounded-2xl"
                            placeholder="输入名字" type="text" />
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 p-6 z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.03)]">
        <button
            class="w-full bg-primary hover:bg-green-400 text-white font-bold text-lg py-4 rounded-2xl shadow-glow transform transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
            下一步
            <span class="material-icons-round group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
    </div>
    <script>
        // Simple logic to toggle a class for demo purposes if needed
        const toggleBtn = document.querySelector('button[title="Toggle Theme"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
    </script>
