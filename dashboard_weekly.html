<!-- Pet Diet Plan Home Page -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>宠物饮食AI计划</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A3D9A5", // Soft sage green as primary
                        secondary: "#FFE898", // Warm yellow for accents
                        "accent-blue": "#B2EBF2", // Soft blue for hydration/mix
                        "background-light": "#FAFAF9", // Warm off-white
                        "background-dark": "#1C1C1E", // Soft dark gray
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2C2C2E",
                        "text-main-light": "#2D3748",
                        "text-main-dark": "#F7FAFC",
                        "text-muted-light": "#718096",
                        "text-muted-dark": "#A0AEC0",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(163, 217, 165, 0.3)',
                    }
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased selection:bg-primary selection:text-white pb-24">
    <header
        class="px-6 pt-12 pb-4 flex justify-between items-center bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="relative">
                <button
                    class="w-12 h-12 rounded-full bg-gray-100 dark:bg-surface-dark border-2 border-dashed border-primary/50 flex items-center justify-center text-primary shadow-sm hover:bg-primary hover:text-white transition-all">
                    <span class="material-icons-round">add</span>
                </button>
            </div>
            <div>
                <p class="text-xs text-text-muted-light dark:text-text-muted-dark font-medium uppercase tracking-wider">
                    欢迎使用</p>
                <button class="text-xl font-bold flex items-center gap-1 hover:text-primary transition-colors">
                    添加宠物
                    <span class="material-icons-round text-primary text-sm">arrow_forward_ios</span>
                </button>
            </div>
        </div>
        <div class="flex gap-3">
            <button
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">search</span>
            </button>
            <button
                class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors relative">
                <span class="material-icons-round">notifications_none</span>
                <span class="absolute top-2 right-2.5 w-2 h-2 bg-red-400 rounded-full"></span>
            </button>
        </div>
    </header>
    <main class="px-6 space-y-8">
        <section>
            <div class="flex justify-between items-end mb-4">
                <div>
                    <h2 class="text-2xl font-bold">本周</h2>
                    <p class="text-sm text-text-muted-light dark:text-text-muted-dark">AI计划： <span
                            class="text-primary font-semibold">待创建</span></p>
                </div>
                <button class="text-sm text-primary font-medium hover:opacity-80 transition-opacity">完整日历</button>
            </div>
            <div class="flex justify-between items-center bg-white dark:bg-surface-dark p-4 rounded-2xl shadow-soft">
                <div class="flex flex-col items-center gap-1 opacity-40">
                    <span class="text-xs font-medium">一</span>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm">18</div>
                </div>
                <div class="flex flex-col items-center gap-1 opacity-40">
                    <span class="text-xs font-medium">二</span>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-sm">19</div>
                </div>
                <div class="flex flex-col items-center gap-1 transform scale-110">
                    <span class="text-xs font-bold text-primary">三</span>
                    <div
                        class="w-10 h-10 rounded-full bg-primary text-white dark:text-gray-900 flex items-center justify-center text-base font-bold shadow-glow relative">
                        20
                        <div class="absolute -bottom-1.5 w-1 h-1 bg-current rounded-full"></div>
                    </div>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <span class="text-xs font-medium text-text-muted-light dark:text-text-muted-dark">四</span>
                    <div
                        class="w-8 h-8 rounded-full bg-background-light dark:bg-background-dark flex items-center justify-center text-sm font-medium">
                        21</div>
                </div>
                <div class="flex flex-col items-center gap-1">
                    <span class="text-xs font-medium text-text-muted-light dark:text-text-muted-dark">五</span>
                    <div
                        class="w-8 h-8 rounded-full bg-background-light dark:bg-background-dark flex items-center justify-center text-sm font-medium">
                        22</div>
                </div>
            </div>
        </section>
        <section class="bg-primary/20 dark:bg-primary/10 rounded-3xl p-6 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-primary/20 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-secondary/30 rounded-full blur-2xl"></div>
            <div class="relative z-10 flex flex-col items-center text-center py-4">
                <div
                    class="w-16 h-16 rounded-full bg-white/60 dark:bg-white/10 backdrop-blur-sm flex items-center justify-center mb-4 shadow-sm text-primary">
                    <span class="material-icons-round text-3xl">pets</span>
                </div>
                <h3 class="font-bold text-xl mb-2">创建您的第一个宠物档案</h3>
                <p class="text-sm text-text-muted-light dark:text-text-muted-dark opacity-80 mb-6 max-w-[240px]">
                    添加您的爱宠信息，为它量身定制专属的科学营养计划。
                </p>
                <button
                    class="bg-primary text-white dark:text-gray-900 font-bold py-3 px-8 rounded-xl shadow-lg hover:shadow-glow hover:-translate-y-0.5 transition-all flex items-center gap-2">
                    <span class="material-icons-round text-lg">add</span>
                    立即添加
                </button>
            </div>
        </section>
        <section>
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                今日餐食
            </h3>
            <div
                class="bg-white dark:bg-surface-dark p-6 rounded-2xl shadow-soft border-2 border-dashed border-gray-200 dark:border-gray-700 flex flex-col items-center text-center gap-3 py-8">
                <div
                    class="w-12 h-12 rounded-full bg-secondary/30 flex items-center justify-center text-yellow-700 dark:text-yellow-200 mb-1">
                    <span class="material-icons-round text-2xl">restaurant_menu</span>
                </div>
                <h4 class="font-bold text-lg">开始智能饮食规划</h4>
                <p class="text-sm text-text-muted-light dark:text-text-muted-dark px-4 mb-2">
                    还没有饮食计划？让AI助手帮您生成完美的每日食谱。
                </p>
                <button class="text-primary font-bold text-sm flex items-center gap-1 hover:underline group">
                    开启规划 <span
                        class="material-icons-round text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                </button>
            </div>
        </section>
        <section class="grid grid-cols-2 gap-4">
            <div
                class="bg-accent-blue/20 dark:bg-accent-blue/10 p-5 rounded-2xl flex flex-col justify-center items-center h-36 relative overflow-hidden text-center">
                <span class="material-icons-round text-4xl text-accent-blue/70 mb-2">lock</span>
                <h4 class="font-bold text-blue-900/60 dark:text-blue-100/60 mb-1">饮水量</h4>
                <p class="text-xs text-blue-800/50 dark:text-blue-200/50 font-medium px-2">记录宠物数据以解锁更多功能</p>
            </div>
            <div
                class="bg-secondary/20 dark:bg-secondary/10 p-5 rounded-2xl flex flex-col justify-center items-center h-36 relative overflow-hidden text-center">
                <span class="material-icons-round text-4xl text-secondary/70 mb-2">lock</span>
                <h4 class="font-bold text-yellow-900/60 dark:text-yellow-100/60 mb-1">当前体重</h4>
                <p class="text-xs text-yellow-800/50 dark:text-yellow-200/50 font-medium px-2">记录宠物数据以解锁更多功能</p>
            </div>
        </section>
    </main>
    <nav
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 pb-safe pt-2 px-6 pb-6 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.03)] z-50">
        <div class="flex justify-between items-center">
            <button class="flex flex-col items-center gap-1 w-12 text-primary">
                <span class="material-icons-round">home</span>
            </button>
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">calendar_today</span>
            </button>
            <button
                class="relative -top-6 bg-primary text-white dark:text-gray-900 w-14 h-14 rounded-full shadow-glow flex items-center justify-center transform transition-transform hover:scale-105 active:scale-95">
                <span class="material-icons-round text-2xl">menu_book</span>
            </button>
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">pie_chart</span>
            </button>
            <button
                class="flex flex-col items-center gap-1 w-12 text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
                <span class="material-icons-round">person</span>
            </button>
        </div>
    </nav>
    <script>
        // Simple logic to toggle a class for demo purposes if needed
        const toggleBtn = document.querySelector('button[title="Toggle Theme"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
    </script>
</body>

</html>
