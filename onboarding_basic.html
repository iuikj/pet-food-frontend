    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>添加宠物</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A3D9A5", // Soft sage green as primary
                        secondary: "#FFE898", // Warm yellow for accents
                        "accent-blue": "#B2EBF2", // Soft blue for hydration/mix
                        "background-light": "#FAFAF9", // Warm off-white
                        "background-dark": "#1C1C1E", // Soft dark gray
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2C2C2E",
                        "text-main-light": "#2D3748",
                        "text-main-dark": "#F7FAFC",
                        "text-muted-light": "#718096",
                        "text-muted-dark": "#A0AEC0",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(163, 217, 165, 0.3)',
                    }
                },
            },
        };

            display: none;

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased selection:bg-primary selection:text-white pb-safe">
    <header
        class="px-6 pt-12 pb-4 flex items-center justify-between bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md sticky top-0 z-50">
        <button
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
            <span class="material-icons-round">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold text-center flex-1">添加宠物</h1>
        <div class="w-10 h-10 flex items-center justify-center">
            <span class="text-xs font-bold text-text-muted-light dark:text-text-muted-dark">2/3</span>
        </div>
    </header>
    <main class="px-6 pb-32 flex flex-col h-full">
        <div class="flex gap-2 mb-8 mt-2 px-2">
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
            <div class="h-1.5 flex-1 bg-gray-200 dark:bg-surface-dark rounded-full"></div>
        </div>
        <div class="flex-1 flex flex-col items-center pt-2">
            <div class="w-full max-w-sm space-y-6">
                <div class="space-y-2 text-center mb-6">
                    <h2 class="text-2xl font-bold text-text-main-light dark:text-text-main-dark">基本信息</h2>
                    <p class="text-sm text-text-muted-light dark:text-text-muted-dark">帮助我们为 Cooper 计算每日热量需求</p>
                </div>
                <div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-6 shadow-soft">
                    <label
                        class="text-sm font-semibold text-text-main-light dark:text-text-main-dark ml-1 mb-4 block">物种</label>
                    <div class="grid grid-cols-3 gap-4">
                        <button
                            class="relative bg-primary/10 ring-2 ring-primary rounded-[1.25rem] p-4 flex flex-col items-center justify-center gap-2 transition-all h-32 shadow-sm group">
                            <div class="w-12 h-12 flex items-center justify-center text-primary">
                                <span
                                    class="material-symbols-outlined text-4xl fill-1">sound_detection_dog_barking</span>
                            </div>
                            <span class="font-bold text-primary dark:text-primary text-sm">狗狗</span>
                            <div class="absolute top-2 right-2 text-primary">
                                <span class="material-icons-round text-lg">check_circle</span>
                            </div>
                        </button>
                        <button
                            class="bg-gray-50 dark:bg-surface-dark border-2 border-transparent rounded-[1.25rem] p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:bg-gray-100 dark:hover:bg-surface-light/5 transition-all h-32 group">
                            <div
                                class="w-12 h-12 flex items-center justify-center text-text-muted-light group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-4xl fill-1 transform rotate-12">pets</span>
                            </div>
                            <span
                                class="font-medium text-text-muted-light dark:text-text-muted-dark text-sm group-hover:text-text-main-light">猫咪</span>
                        </button>
                        <button
                            class="bg-gray-50 dark:bg-surface-dark border-2 border-transparent rounded-[1.25rem] p-4 flex flex-col items-center justify-center gap-2 shadow-sm hover:bg-gray-100 dark:hover:bg-surface-light/5 transition-all h-32 group">
                            <div
                                class="w-12 h-12 flex items-center justify-center text-text-muted-light group-hover:text-primary transition-colors">
                                <span class="material-symbols-outlined text-4xl font-bold">question_mark</span>
                            </div>
                            <span
                                class="font-medium text-text-muted-light dark:text-text-muted-dark text-sm group-hover:text-text-main-light">其他物种</span>
                        </button>
                    </div>
                </div>
                <div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-6 shadow-soft">
                    <label
                        class="text-sm font-semibold text-text-main-light dark:text-text-main-dark ml-1 mb-4 block">品种</label>
                    <div
                        class="relative bg-background-light dark:bg-surface-dark rounded-2xl shadow-inner transition-all focus-within:ring-2 focus-within:ring-primary/50 focus-within:shadow-glow">
                        <input
                            class="w-full bg-transparent border-none py-4 pl-5 pr-12 text-base font-medium text-text-main-light dark:text-text-main-dark focus:ring-0 placeholder-gray-300 dark:placeholder-gray-600 rounded-2xl"
                            placeholder="输入品种" type="text" value="金毛寻回犬" />
                        <div
                            class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-text-muted-light">
                            <span class="material-icons-round text-xl opacity-70">edit</span>
                        </div>
                    </div>
                </div>
                <div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-6 shadow-soft">
                    <div class="grid grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label
                                class="text-sm font-semibold text-text-main-light dark:text-text-main-dark ml-1">年龄</label>
                            <div
                                class="bg-background-light dark:bg-surface-dark rounded-2xl shadow-inner flex items-center px-5 py-4 focus-within:ring-2 focus-within:ring-primary/50 focus-within:shadow-glow transition-all">
                                <input
                                    class="w-full bg-transparent border-none p-0 text-xl font-bold text-text-main-light dark:text-text-main-dark focus:ring-0 placeholder-gray-300 dark:placeholder-gray-600"
                                    placeholder="0" type="number" value="3" />
                                <span class="text-sm font-bold text-text-muted-light ml-1">岁</span>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-sm font-semibold text-text-main-light dark:text-text-main-dark ml-1">体重</label>
                            <div
                                class="bg-background-light dark:bg-surface-dark rounded-2xl shadow-inner flex items-center px-5 py-4 focus-within:ring-2 focus-within:ring-primary/50 focus-within:shadow-glow transition-all">
                                <input
                                    class="w-full bg-transparent border-none p-0 text-xl font-bold text-text-main-light dark:text-text-main-dark focus:ring-0 placeholder-gray-300 dark:placeholder-gray-600"
                                    placeholder="0.0" type="number" />
                                <span class="text-sm font-bold text-text-muted-light ml-1">KG</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 p-6 z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.03)]">
        <button
            class="w-full bg-primary hover:bg-green-400 text-white font-bold text-lg py-4 rounded-2xl shadow-glow transform transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
            下一步
            <span class="material-icons-round group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
    </div>
    <script>
        // Simple logic to toggle a class for demo purposes if needed
        const toggleBtn = document.querySelector('button[title="Toggle Theme"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
    </script>
</body>

</html>
