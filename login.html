<!-- Pet Diet Plan Home Page -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>登录 - 宠物饮食AI计划</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A3D9A5", // Soft sage green
                        secondary: "#FFE898", // Warm yellow
                        "accent-blue": "#B2EBF2", // Soft blue
                        "background-light": "#FAFAF9", // Warm off-white
                        "background-dark": "#1C1C1E", // Soft dark gray
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2C2C2E",
                        "text-main-light": "#2D3748",
                        "text-main-dark": "#F7FAFC",
                        "text-muted-light": "#718096",
                        "text-muted-dark": "#A0AEC0",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(163, 217, 165, 0.3)',
                    },
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased h-screen flex flex-col justify-center px-6 relative overflow-hidden">
    <div
        class="absolute -top-[20%] -right-[20%] w-[80%] h-[80%] bg-primary/20 rounded-full blur-[100px] pointer-events-none">
    </div>
    <div
        class="absolute -bottom-[20%] -left-[20%] w-[60%] h-[60%] bg-secondary/20 rounded-full blur-[80px] pointer-events-none">
    </div>
    <div class="relative z-10 w-full max-w-sm mx-auto">
        <div class="text-center mb-10">
            <div
                class="w-16 h-16 rounded-2xl bg-gradient-to-br from-primary to-accent-blue mx-auto flex items-center justify-center text-white shadow-lg mb-4 transform rotate-3">
                <span class="material-icons-round text-3xl">pets</span>
            </div>
            <h1 class="text-3xl font-bold mb-2">欢迎回来</h1>
            <p class="text-text-muted-light dark:text-text-muted-dark">请登录以管理您的宠物饮食计划</p>
        </div>
        <form class="space-y-4">
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-muted-light uppercase tracking-wider ml-1"
                    for="email">电子邮箱</label>
                <div
                    class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-transparent focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/10 transition-all flex items-center px-4 py-3">
                    <span class="material-icons-round text-text-muted-light mr-3">email</span>
                    <input
                        class="bg-transparent border-none p-0 w-full text-sm font-medium focus:ring-0 placeholder-gray-400"
                        id="email" placeholder="example@email.com" type="email" />
                </div>
            </div>
            <div class="space-y-1">
                <label class="text-xs font-bold text-text-muted-light uppercase tracking-wider ml-1"
                    for="password">密码</label>
                <div
                    class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm border border-transparent focus-within:border-primary focus-within:ring-4 focus-within:ring-primary/10 transition-all flex items-center px-4 py-3">
                    <span class="material-icons-round text-text-muted-light mr-3">lock</span>
                    <input
                        class="bg-transparent border-none p-0 w-full text-sm font-medium focus:ring-0 placeholder-gray-400"
                        id="password" placeholder="••••••••" type="password" />
                    <button class="text-text-muted-light hover:text-text-main-light focus:outline-none" type="button">
                        <span class="material-icons-round">visibility_off</span>
                    </button>
                </div>
            </div>
            <div class="flex justify-end">
                <a class="text-xs font-bold text-primary hover:text-primary-dark transition-colors" href="#">忘记密码？</a>
            </div>
            <button
                class="w-full bg-text-main-light dark:bg-white text-white dark:text-text-main-light font-bold text-lg py-4 rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-4"
                type="button">
                登录
                <span class="material-icons-round text-xl">login</span>
            </button>
        </form>
        <div class="mt-8">
            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
                </div>
                <div class="relative flex justify-center">
                    <span
                        class="px-4 bg-background-light dark:bg-background-dark text-xs text-text-muted-light uppercase tracking-wider font-semibold">
                        或使用社交账号
                    </span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-6">
                <button
                    class="flex items-center justify-center gap-2 py-3 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors border border-gray-100 dark:border-gray-800">
                    <img alt="Google" class="w-5 h-5"
                        src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" />
                    <span class="text-sm font-bold">Google</span>
                </button>
                <button
                    class="flex items-center justify-center gap-2 py-3 bg-surface-light dark:bg-surface-dark rounded-xl shadow-sm hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors border border-gray-100 dark:border-gray-800">
                    <span class="material-icons-round text-green-500 text-xl">wechat</span>
                    <span class="text-sm font-bold">WeChat</span>
                </button>
            </div>
        </div>
        <p class="text-center mt-8 text-sm text-text-muted-light">
            还没有账号？
            <a class="font-bold text-primary hover:text-primary-dark hover:underline transition-colors"
                href="#">立即注册</a>
        </p>
    </div>
    <script>
        // Placeholder for interactivity if needed later
    </script>
</body>

</html>
