<!-- Pet Diet Plan Home Page -->
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>添加宠物 (健康信息)</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#A3D9A5", // Soft sage green as primary
                        secondary: "#FFE898", // Warm yellow for accents
                        "accent-blue": "#B2EBF2", // Soft blue for hydration/mix
                        "background-light": "#FAFAF9", // Warm off-white
                        "background-dark": "#1C1C1E", // Soft dark gray
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2C2C2E",
                        "text-main-light": "#2D3748",
                        "text-main-dark": "#F7FAFC",
                        "text-muted-light": "#718096",
                        "text-muted-dark": "#A0AEC0",
                    },
                    fontFamily: {
                        display: ["'Plus Jakarta Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        'xl': '1.5rem',
                        '2xl': '2rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 15px rgba(163, 217, 165, 0.3)',
                    }
                },
            },
        };
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-text-main-light dark:text-text-main-dark transition-colors duration-300 antialiased selection:bg-primary selection:text-white pb-safe">
    <header
        class="px-6 pt-12 pb-4 flex items-center justify-between bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md sticky top-0 z-50">
        <button
            class="w-10 h-10 rounded-full bg-white dark:bg-surface-dark shadow-sm flex items-center justify-center text-text-muted-light dark:text-text-muted-dark hover:text-primary transition-colors">
            <span class="material-icons-round">arrow_back</span>
        </button>
        <h1 class="text-xl font-bold text-center flex-1">添加宠物</h1>
        <div class="w-10 h-10 flex items-center justify-center">
            <span class="text-xs font-bold text-text-muted-light dark:text-text-muted-dark">3/3</span>
        </div>
    </header>
    <main class="px-6 pb-32 flex flex-col h-full">
        <div class="flex gap-2 mb-8 mt-2 px-2">
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
            <div class="h-1.5 flex-1 bg-primary rounded-full"></div>
        </div>
        <div class="flex-1 flex flex-col items-center pt-2">
            <div class="w-full max-w-sm space-y-8">
                <div class="space-y-2 text-center mb-6">
                    <h2 class="text-2xl font-bold text-text-main-light dark:text-text-main-dark">健康信息</h2>
                    <p class="text-sm text-text-muted-light dark:text-text-muted-dark">Cooper 有什么过敏或需要注意的健康问题吗？</p>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-sm font-semibold text-text-main-light dark:text-text-main-dark"
                            for="allergens-input">过敏源</label>
                    </div>
                    <div class="relative bg-white dark:bg-surface-dark rounded-2xl p-4 shadow-soft">
                        <div class="flex flex-wrap gap-2 mb-2 items-center min-h-[40px]">
                            <span
                                class="inline-flex items-center px-3 py-1 rounded-full bg-primary/20 text-green-900 dark:text-green-100 text-sm font-medium">
                                谷物
                                <button
                                    class="ml-1 -mr-1 h-4 w-4 rounded-full flex items-center justify-center text-green-700 dark:text-green-200 hover:bg-primary/30"
                                    type="button">
                                    <span class="material-icons-round text-xs">close</span>
                                </button>
                            </span>
                            <input
                                class="flex-1 min-w-[100px] border-none focus:ring-0 bg-transparent text-sm text-text-main-light dark:text-text-main-dark p-0"
                                id="allergens-input" placeholder="输入或选择过敏源..." type="text" />
                        </div>
                    </div>
                    <div class="no-scrollbar flex overflow-x-auto gap-2 py-1 -mt-1">
                        <button
                            class="relative px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 shadow-soft text-sm font-semibold text-gray-700 dark:text-gray-300 border border-transparent transition-all active:scale-95 whitespace-nowrap">
                            无
                        </button>
                        <button
                            class="relative px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            鸡肉
                        </button>
                        <button
                            class="relative px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            牛肉
                        </button>
                        <button
                            class="relative px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            乳制品
                        </button>
                        <button
                            class="relative px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            海鲜/鱼
                        </button>
                        <button
                            class="relative px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            羊肉
                        </button>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center justify-between px-1">
                        <label class="text-sm font-semibold text-text-main-light dark:text-text-main-dark"
                            for="health-issues-input">近期健康困扰</label>
                    </div>
                    <div class="relative bg-white dark:bg-surface-dark rounded-2xl p-4 shadow-soft">
                        <div class="flex flex-wrap gap-2 mb-2 items-center min-h-[40px]">
                            <span
                                class="inline-flex items-center px-3 py-1 rounded-full bg-primary/20 text-green-900 dark:text-green-100 text-sm font-medium">
                                <span class="material-icons-round text-sm mr-1">opacity</span>
                                泪痕严重
                                <button
                                    class="ml-1 -mr-1 h-4 w-4 rounded-full flex items-center justify-center text-green-700 dark:text-green-200 hover:bg-primary/30"
                                    type="button">
                                    <span class="material-icons-round text-xs">close</span>
                                </button>
                            </span>
                            <input
                                class="flex-1 min-w-[100px] border-none focus:ring-0 bg-transparent text-sm text-text-main-light dark:text-text-main-dark p-0"
                                id="health-issues-input" placeholder="输入或选择困扰..." type="text" />
                        </div>
                    </div>
                    <div class="no-scrollbar flex overflow-x-auto gap-2 py-1 -mt-1">
                        <button
                            class="flex items-center justify-center gap-1 px-4 py-2 rounded-full bg-gray-200 dark:bg-gray-700 shadow-soft text-sm font-semibold text-gray-700 dark:text-gray-300 border border-transparent transition-all active:scale-95 whitespace-nowrap">
                            <span class="material-icons-round text-base">block</span>
                            无
                        </button>
                        <button
                            class="flex items-center justify-center gap-1 px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            <span class="material-icons-round text-base text-text-muted-light">healing</span>
                            皮肤瘙痒
                        </button>
                        <button
                            class="flex items-center justify-center gap-1 px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            <span class="material-icons-round text-base text-text-muted-light">monitor_weight</span>
                            体重超标
                        </button>
                        <button
                            class="flex items-center justify-center gap-1 px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            <span
                                class="material-icons-round text-base text-text-muted-light">sentiment_dissatisfied</span>
                            软便/拉稀
                        </button>
                        <button
                            class="flex items-center justify-center gap-1 px-4 py-2 rounded-full bg-white dark:bg-surface-dark shadow-soft text-sm font-semibold text-text-main-light dark:text-text-main-dark border border-transparent hover:border-primary/50 transition-all active:scale-95 whitespace-nowrap">
                            <span class="material-icons-round text-base text-text-muted-light">restaurant</span>
                            挑食
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div
        class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-surface-dark/90 backdrop-blur-lg border-t border-gray-100 dark:border-gray-800 p-6 z-50 rounded-t-3xl shadow-[0_-5px_20px_rgba(0,0,0,0.03)]">
        <button
            class="w-full bg-primary hover:bg-green-400 text-white font-bold text-lg py-4 rounded-2xl shadow-glow transform transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
            保存
            <span class="material-icons-round group-hover:scale-110 transition-transform">check</span>
        </button>
    </div>
    <script>
        // Simple logic to toggle a class for demo purposes if needed
        const toggleBtn = document.querySelector('button[title="Toggle Theme"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });
        }
    </script>
</body>

</html>
